<body>
  <div id="game-container">
    <!-- Player view -->
    <div id="player-view" style="display:none;">
      <h2>Il tuo ruolo</h2>
      <div id="role-card" class="card">Ruolo</div>
      <button id="toggle-card">Scopri/Nascondi Ruolo</button>
      <!-- Wrapper per eventuali elementi aggiuntivi -->
      <div id="player-card-container"></div>
    </div>

    <!-- Narratore view -->
    <div id="narrator-view" style="display:none;">
      <h2>Schermata Narratore</h2>
      <button id="toggle-phase-btn">Passa al giorno/notte</button>
      <h3>Giocatori</h3>
      <div id="narrator-table-container"></div>
      <ul id="players-narrator"></ul>
      <button id="end-game-btn">Termina Partita</button>
    </div>
  </div>

  <script type="module" src="assets/js/game.js" defer></script>
</body>
